<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doména na prodej</title>
  <meta name="description" content="Tato doména je k dispozici. V případě zájmu mě kontaktujte." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <div class="card">
      <p class="label">Doménové parkoviště</p>
      <h1 id="domainName">example.cz</h1>
      <p class="subtitle">
        Tato doména je momentálně zaparkovaná a může být k dispozici k odkupu.
      </p>

      <div class="actions">
        <a id="contactLink" class="btn primary" href="mailto:info@petrvurm.cz?subject=Zájem o doménu">
          Mám zájem
        </a>
        <a class="btn secondary" href="https://petrvurm.cz" target="_blank" rel="noopener noreferrer">
          petrvurm.cz
        </a>
      </div>

      <p class="note">
        Pro více informací napište na
        <a href="mailto:info@petrvurm.cz">info@petrvurm.cz</a>
      </p>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
