<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Domain for sale</title>
  <meta id="metaDescription" name="description" content="This domain may be available for acquisition." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <div class="card">
      <p id="labelText" class="label">Domain parking</p>
      <h1 id="domainName">example.cz</h1>
      <p id="subtitleText" class="subtitle">This domain is currently parked and may be available for purchase.</p>

      <div class="actions">
        <a id="contactLink" class="btn primary" href="mailto:info@petrvurm.cz?subject=Zájem o doménu">
          <span id="contactCtaText">I am interested</span>
        </a>
        <a class="btn secondary" href="https://petrvurm.cz" target="_blank" rel="noopener noreferrer">
          petrvurm.cz
        </a>
      </div>

      <p class="note">
        <span id="notePrefixText">For more information, contact</span>
        <a id="noteMailLink" href="mailto:info@petrvurm.cz">info@petrvurm.cz</a>
      </p>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
